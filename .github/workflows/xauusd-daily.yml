name: XAUUSD Daily Report

on:
  schedule:
    - cron: '0 21 * * 0-4'   # Morning Mon-Fri Beijing 05:00 (UTC 21:00 Sun-Thu)
    - cron: '0 11 * * 1-5'   # Evening recheck Mon-Fri Beijing 19:00 (UTC 11:00 Mon-Fri)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate and push report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python3 <<'PYEOF'
          import urllib.request, json, os, subprocess
          from datetime import datetime, timezone, timedelta, date as date_type

          beijing_tz = timezone(timedelta(hours=8))
          now_bj   = datetime.now(beijing_tz)
          today    = now_bj.date()
          date_str = str(today.day) + '-' + str(today.month) + '-' + str(today.year)

          # Detect recheck mode: UTC 10-16 (Beijing 18-24) = evening recheck
          # Wider window accounts for GitHub Actions cron delays (cron 11:00 can fire up to 14:00+)
          utc_now    = datetime.now(timezone.utc)
          is_pm      = 10 <= utc_now.hour <= 16
          run_suffix = '-pm' if is_pm else ''
          title_tag  = ' &middot; 19:00 复评' if is_pm else ''
          print('Run mode:', 'PM RECHECK' if is_pm else 'AM MORNING', 'UTC hour:', utc_now.hour)

          # 1. Gold OHLC (30 days for ATR/RSI)
          req = urllib.request.Request(
              'https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF?interval=1d&range=30d',
              headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=15) as r:
              d = json.loads(r.read())
          q = d['chart']['result'][0]['indicators']['quote'][0]
          bars = [(h, l, c) for h, l, c in zip(q['high'], q['low'], q['close'])
                  if h is not None and l is not None and c is not None]
          highs  = [b[0] for b in bars]
          lows   = [b[1] for b in bars]
          closes = [b[2] for b in bars]
          gold = round(closes[-1], 2)
          print('GOLD:', gold, 'bars:', len(bars))
          if gold < 3000:
              raise Exception('Invalid gold price: ' + str(gold))

          # 1.5 Technical indicators (ATR + RSI)
          def calc_atr(h, l, c, period=14):
              trs = []
              for i in range(1, len(h)):
                  tr = max(h[i] - l[i], abs(h[i] - c[i-1]), abs(l[i] - c[i-1]))
                  trs.append(tr)
              if not trs:
                  return 0
              return sum(trs[-period:]) / min(len(trs), period)

          def calc_rsi(c, period=14):
              if len(c) < period + 1:
                  return 50.0
              gains, losses = [], []
              for i in range(1, len(c)):
                  diff = c[i] - c[i-1]
                  gains.append(max(diff, 0))
                  losses.append(max(-diff, 0))
              avg_g = sum(gains[-period:]) / period
              avg_l = sum(losses[-period:]) / period
              if avg_l == 0:
                  return 100.0
              rs = avg_g / avg_l
              return 100 - (100 / (1 + rs))

          atr = round(calc_atr(highs, lows, closes), 2)
          rsi = round(calc_rsi(closes), 1)
          if rsi >= 70:
              rsi_state, rsi_color = '超买', '#ff6b6b'
          elif rsi <= 30:
              rsi_state, rsi_color = '超卖', '#51cf66'
          else:
              rsi_state, rsi_color = '中性', '#aaa'
          # Trend strength signals (for range detection)
          ma20 = sum(closes[-20:]) / min(len(closes), 20)
          price_vs_ma20 = abs((gold - ma20) / ma20 * 100) if ma20 else 0
          recent_high = max(highs[-5:]) if len(highs) >= 5 else gold
          recent_low  = min(lows[-5:])  if len(lows)  >= 5 else gold
          range_5d_pct = (recent_high - recent_low) / gold * 100 if gold else 0
          print('ATR:', atr, 'RSI:', rsi, rsi_state, '5d_range%:', round(range_5d_pct,2), 'vsMA20%:', round(price_vs_ma20,2))

          # 2. DXY
          try:
              req2 = urllib.request.Request(
                  'https://query1.finance.yahoo.com/v8/finance/chart/DX-Y.NYB?interval=1d&range=5d',
                  headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req2, timeout=15) as r:
                  d2 = json.loads(r.read())
              dxy_list = [p for p in d2['chart']['result'][0]['indicators']['quote'][0]['close'] if p]
              dxy      = round(dxy_list[-1], 2)
              dxy_prev = round(dxy_list[-2], 2)
              dxy_dir  = 'falling' if dxy < dxy_prev else 'rising'
              dxy_move_pct = abs((dxy - dxy_prev) / dxy_prev * 100) if dxy_prev else 0
          except Exception as e:
              dxy, dxy_prev, dxy_dir, dxy_move_pct = 99.0, 99.0, 'unknown', 0.0
              print('DXY fallback:', e)

          # 2.5 US10Y yield (^TNX) — key gold driver
          try:
              tnx_req = urllib.request.Request(
                  'https://query1.finance.yahoo.com/v8/finance/chart/%5ETNX?interval=1d&range=5d',
                  headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(tnx_req, timeout=15) as r:
                  tnx_d = json.loads(r.read())
              tnx_list = [p for p in tnx_d['chart']['result'][0]['indicators']['quote'][0]['close'] if p]
              tnx        = round(tnx_list[-1], 3)
              tnx_prev   = round(tnx_list[-2], 3) if len(tnx_list) >= 2 else tnx
              tnx_dir    = 'rising' if tnx > tnx_prev else ('falling' if tnx < tnx_prev else 'flat')
              tnx_chg_pct = abs((tnx - tnx_prev) / tnx_prev * 100) if tnx_prev else 0
              tnx_cn     = '上行' if tnx_dir == 'rising' else ('下行' if tnx_dir == 'falling' else '持平')
          except Exception as e:
              tnx, tnx_prev, tnx_dir, tnx_chg_pct, tnx_cn = 4.0, 4.0, 'unknown', 0.0, '未知'
              print('TNX fallback:', e)

          # 3. Dynamic S/R from ATR + multi-factor bias
          r1 = round(gold + atr * 0.5, 1)
          r2 = round(gold + atr * 1.2, 1)
          s1 = round(gold - atr * 0.5, 1)
          s2 = round(gold - atr * 1.2, 1)

          # Multi-factor bias score: DXY + US10Y + RSI extreme
          score = 0.0
          if dxy_dir == 'falling': score += 1
          elif dxy_dir == 'rising': score -= 1
          if tnx_dir == 'falling': score += 1
          elif tnx_dir == 'rising': score -= 1
          if rsi >= 70: score -= 0.5
          elif rsi <= 30: score += 0.5

          # Range detection: all conditions met = no trend
          is_ranging = (
              abs(score) < 1 and
              price_vs_ma20 < 0.5 and
              40 < rsi < 60 and
              range_5d_pct < 2.0
          )

          if is_ranging:
              bias_cn, bias_color = '震荡', '#ffa94d'
          elif score >= 1:
              bias_cn, bias_color = '做多', '#00c853'
          elif score <= -1:
              bias_cn, bias_color = '做空', '#ff1744'
          else:
              bias_cn, bias_color = '中性', '#aaa'
          dxy_cn = '下行' if dxy_dir == 'falling' else ('上行' if dxy_dir == 'rising' else '持平')
          print('Bias score:', score, '→', bias_cn, '(ranging:', is_ranging, ')')

          # 4. Economic calendar with directional scoring (ForexFactory)
          events_html = ''
          try:
              cal_req = urllib.request.Request(
                  'https://nfs.faireconomy.media/ff_calendar_thisweek.json',
                  headers={'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json'})
              with urllib.request.urlopen(cal_req, timeout=10) as r:
                  calendar = json.loads(r.read())

              def parse_val(s):
                  if not s or not s.strip():
                      return None
                  s = s.strip().replace(',', '').replace('$', '').replace('%', '')
                  mult = 1
                  if s.upper().endswith('K'):
                      mult, s = 1000, s[:-1]
                  elif s.upper().endswith('M'):
                      mult, s = 1000000, s[:-1]
                  elif s.upper().endswith('B'):
                      mult, s = 1000000000, s[:-1]
                  try:
                      return float(s) * mult
                  except Exception:
                      return None

              def score_event(title, fc, pv):
                  f, p = parse_val(fc), parse_val(pv)
                  t = title.lower()
                  if any(k in t for k in ['fomc', 'federal funds', 'powell', 'fed chair', 'minutes']):
                      return 3, 0, '高度关注'
                  if f is None or p is None:
                      return 1, 0, ''
                  stronger = f > p
                  if any(k in t for k in ['nonfarm', 'payroll', 'gdp', 'ism', 'retail sales', 'durable']):
                      w = 3 if 'nonfarm' in t or 'payroll' in t else 2
                      d = -1 if stronger else 1
                      hint = ('预期强于前值，利空金' if d == -1 else '预期弱于前值，利好金')
                      return w, d, hint
                  if any(k in t for k in ['cpi', 'pce', 'ppi', 'inflation']):
                      d = -1 if stronger else 1
                      hint = ('通胀预期升，短期利空金' if d == -1 else '通胀预期降，短期利好金')
                      return 2, d, hint
                  if any(k in t for k in ['jobless', 'unemployment', 'claims']):
                      d = 1 if stronger else -1
                      hint = ('就业走弱，利好金' if d == 1 else '就业强劲，利空金')
                      return 2, d, hint
                  return 1, 0, ''

              today_evs = []
              soon_evs  = []
              total_w, net_score = 0, 0

              for ev in calendar:
                  if ev.get('country') != 'USD' or ev.get('impact') != 'High':
                      continue
                  ev_date_str = ev.get('date', '')[:10]
                  try:
                      ev_date   = date_type.fromisoformat(ev_date_str)
                      days_away = (ev_date - today).days
                  except Exception:
                      continue
                  if days_away < 0 or days_away > 4:
                      continue
                  title = ev.get('title', '')
                  fc    = ev.get('forecast', '')
                  pv    = ev.get('previous', '')
                  w, d, hint = score_event(title, fc, pv)
                  ev_time = ev.get('time', '')[:5]
                  if days_away == 0:
                      today_evs.append((title, fc, pv, ev_time, hint, d))
                      total_w  += w
                      net_score += w * d
                  else:
                      label = '明天' if days_away == 1 else str(days_away) + '天后'
                      soon_evs.append((title, label))

              if today_evs or soon_evs:
                  rows = ''
                  for title, fc, pv, ev_time, hint, d in today_evs:
                      fc_txt = ('预测 ' + fc) if fc else '预测 —'
                      pv_txt = ('前值 ' + pv) if pv else '前值 —'
                      hint_html = ('<span class="ev-hint ' + ('ev-bear' if d < 0 else ('ev-bull' if d > 0 else 'ev-watch')) + '">' + hint + '</span>') if hint else ''
                      rows += ('<div class="ev-row">'
                               '<div class="ev-left"><span class="ev-name">' + title + '</span>'
                               + hint_html + '</div>'
                               '<div class="ev-right"><span class="ev-num">' + fc_txt + '</span>'
                               '<span class="ev-num ev-prev">' + pv_txt + '</span>'
                               '<span class="ev-time">' + ev_time + '</span></div></div>')
                  for title, label in soon_evs:
                      rows += ('<div class="ev-row ev-soon">'
                               '<span class="ev-name">' + title + '</span>'
                               '<span class="ev-tag">' + label + '</span></div>')

                  if total_w > 0:
                      ratio = net_score / total_w
                      if ratio > 0.25:
                          verdict_txt   = '数据面倾向：利好黄金 &#9650;'
                          verdict_cls   = 'ev-bull'
                      elif ratio < -0.25:
                          verdict_txt   = '数据面倾向：利空黄金 &#9660;'
                          verdict_cls   = 'ev-bear'
                      else:
                          verdict_txt   = '数据面倾向：方向中性 &#9644;'
                          verdict_cls   = 'ev-watch'
                      verdict_html = '<div class="evt-verdict ' + verdict_cls + '">' + verdict_txt + '</div>'
                  else:
                      verdict_html = '<div class="evt-verdict ev-watch">含 FOMC / 讲话，方向待定</div>'

                  events_html = (
                      '<div class="evt">'
                      '<div class="evt-hdr">&#9888; 今日及近期重大数据（USD）</div>'
                      + rows + verdict_html + '</div>')
              # Detect FOMC among today's events
              has_fomc = any('fomc' in t.lower() or 'federal funds' in t.lower()
                             for t, fc, pv, ev_time, hint, d in today_evs)
              # Confidence: based on bias score strength + range detection
              abs_score = abs(score)
              if has_fomc:
                  conf_label = '低'   # FOMC = high uncertainty
              elif is_ranging:
                  conf_label = '中'   # Range identification is itself a clear signal
              elif abs_score >= 2:
                  conf_label = '高'   # 2+ confirming signals
              elif abs_score >= 1:
                  conf_label = '中'   # 1 clear signal
              else:
                  conf_label = '低'   # mixed / weak signals
              # Calendar conflict downgrades confidence (only for directional bias)
              if total_w > 0 and not is_ranging:
                  cal_ratio = net_score / total_w
                  if (cal_ratio > 0.25 and score < 0) or (cal_ratio < -0.25 and score > 0):
                      conf_label = '低'
              print('Calendar OK, today:', len(today_evs), 'soon:', len(soon_evs), 'conf:', conf_label)
          except Exception as e:
              conf_label = '中'
              print('Calendar failed:', e)

          # 4.5 Volume Profile from intraday GC=F (last 12h = ACC+MAN window)
          vp_html = ''
          vp_poc = vp_vah = vp_val = None
          vp_pos_cn = ''
          vp_hint = ''
          try:
              vp_req = urllib.request.Request(
                  'https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF?interval=30m&range=2d',
                  headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(vp_req, timeout=15) as r:
                  vp_d = json.loads(r.read())
              result = vp_d['chart']['result'][0]
              tss = result.get('timestamp', [])
              qvp = result['indicators']['quote'][0]
              o_a = qvp.get('open', [])
              h_a = qvp.get('high', [])
              l_a = qvp.get('low', [])
              c_a = qvp.get('close', [])
              v_a = qvp.get('volume', [])
              # Window: last 12 hours = today's ACC+MAN (NY 1900 yesterday - 0700 today)
              w_end_ts = utc_now.timestamp()
              w_start_ts = (utc_now - timedelta(hours=12)).timestamp()
              bars_vp = []
              for i, ts in enumerate(tss):
                  if w_start_ts <= ts < w_end_ts:
                      if (i < len(h_a) and i < len(l_a) and i < len(v_a)
                          and h_a[i] is not None and l_a[i] is not None
                          and c_a[i] is not None and v_a[i]):
                          bars_vp.append({
                              'h': h_a[i], 'l': l_a[i],
                              'c': c_a[i], 'o': o_a[i] if i < len(o_a) and o_a[i] is not None else c_a[i],
                              'v': v_a[i]})
              if len(bars_vp) >= 5:
                  sess_h = max(b['h'] for b in bars_vp)
                  sess_l = min(b['l'] for b in bars_vp)
                  if sess_h > sess_l:
                      rows = 10
                      bkt  = (sess_h - sess_l) / rows
                      tv   = [0.0] * rows
                      for b in bars_vp:
                          rng_b = max(b['h'] - b['l'], 0.01)
                          for i in range(rows):
                              bl = sess_l + i * bkt
                              bh = sess_l + (i + 1) * bkt
                              ov_l = max(b['l'], bl)
                              ov_h = min(b['h'], bh)
                              if ov_h > ov_l:
                                  tv[i] += b['v'] * (ov_h - ov_l) / rng_b
                      max_tv = max(tv)
                      poc_i  = tv.index(max_tv)
                      total  = sum(tv)
                      target = total * 0.70
                      va_v   = tv[poc_i]
                      va_hi  = poc_i
                      va_lo  = poc_i
                      while va_v < target:
                          up = va_hi + 1
                          dn = va_lo - 1
                          uv = tv[up] if up < rows else 0
                          dv = tv[dn] if dn >= 0 else 0
                          if uv == 0 and dv == 0:
                              break
                          if uv >= dv:
                              va_hi = up
                              va_v += uv
                          else:
                              va_lo = dn
                              va_v += dv
                      vp_poc = round(sess_l + (poc_i + 0.5) * bkt, 1)
                      vp_vah = round(sess_l + (va_hi + 1)   * bkt, 1)
                      vp_val = round(sess_l +  va_lo         * bkt, 1)
                      # Position assessment vs current price
                      if gold > vp_vah:
                          vp_pos_cn, vp_hint, vp_color = '价值区上方', '强势，VAH 转支撑', '#51cf66'
                      elif gold < vp_val:
                          vp_pos_cn, vp_hint, vp_color = '价值区下方', '弱势，VAL 为阻力', '#ff6b6b'
                      elif abs(gold - vp_poc) < bkt * 0.5:
                          vp_pos_cn, vp_hint, vp_color = 'POC 附近', '价值中枢，方向待选', '#FFD700'
                      elif gold > vp_poc:
                          vp_pos_cn, vp_hint, vp_color = '价值区上半区', '偏多区，POC 是支撑', '#a3d977'
                      else:
                          vp_pos_cn, vp_hint, vp_color = '价值区下半区', '偏空区，POC 是阻力', '#ffa94d'
                      vp_html = (
                          '<div class="vpsec">'
                          '<div class="vp-title">今日 ACC+MAN Volume Profile（' + str(len(bars_vp)) + '根30m）</div>'
                          '<div class="vp-grid">'
                          '<div class="vp-cell"><div class="vp-l">VAH</div><div class="vp-v vp-vah">' + str(vp_vah) + '</div></div>'
                          '<div class="vp-cell"><div class="vp-l">POC</div><div class="vp-v vp-poc">' + str(vp_poc) + '</div></div>'
                          '<div class="vp-cell"><div class="vp-l">VAL</div><div class="vp-v vp-val">' + str(vp_val) + '</div></div>'
                          '</div>'
                          '<div class="vp-pos" style="color:' + vp_color + '">' + vp_pos_cn + ' &middot; ' + vp_hint + '</div>'
                          '</div>')
                      print('VP OK - POC:', vp_poc, 'VAH:', vp_vah, 'VAL:', vp_val, 'pos:', vp_pos_cn)
                  else:
                      print('VP skip: no range')
              else:
                  print('VP skip: only', len(bars_vp), 'bars')
          except Exception as e:
              print('VP failed:', e)

          # 5. DeepSeek (bias-locked: strategy must match daily bias)
          if bias_cn == '震荡':
              bias_en = 'RANGING'
          elif bias_cn == '做空':
              bias_en = 'BEARISH'
          elif bias_cn == '做多':
              bias_en = 'BULLISH'
          else:
              bias_en = 'NEUTRAL'
          fund, tech, strat = [], [], ''
          ds_key = os.environ.get('DEEPSEEK_API_KEY', '')
          if ds_key:
              try:
                  if bias_en == 'BEARISH':
                      bias_instr = 'Strategy MUST start with a sell/short idea (e.g. 反弹至R1做空). NEVER suggest buying.'
                  elif bias_en == 'BULLISH':
                      bias_instr = 'Strategy MUST start with a buy/long idea (e.g. 回调至S1做多). NEVER suggest selling.'
                  elif bias_en == 'RANGING':
                      bias_instr = ('Market is RANGING (low volatility, no direction). Strategy MUST suggest range trading: '
                                    'e.g. "区间' + str(s1) + '-' + str(r1) + '内高抛低吸，突破后顺势". '
                                    'Do NOT suggest a one-way directional bet.')
                  else:
                      bias_instr = 'Strategy should say wait for clearer direction.'
                  vp_str = ''
                  if vp_poc is not None:
                      vp_str = (' VolProfile:POC=' + str(vp_poc) + ' VAH=' + str(vp_vah) +
                                ' VAL=' + str(vp_val) + ' Pos=' + vp_pos_cn)
                  prompt = ('Gold: XAU/USD=' + str(gold) +
                      ' DXY=' + str(dxy) + '(' + dxy_dir + ')' +
                      ' US10Y=' + str(tnx) + '%(' + tnx_dir + ')' +
                      ' RSI14=' + str(rsi) + '(' + rsi_state + ')' +
                      ' ATR14=' + str(atr) +
                      ' R2=' + str(r2) + ' R1=' + str(r1) + ' S1=' + str(s1) + ' S2=' + str(s2) +
                      vp_str +
                      ' DailyBias=' + bias_en +
                      '\nIMPORTANT: ' + bias_instr +
                      ' Use the real indicators (RSI/ATR/US10Y/VP) in the analysis. Write Chinese gold analysis. Respond ONLY valid JSON no markdown:\n' +
                      '{"fundamental":["pt1","pt2","pt3","pt4"],"technical":["pt1","pt2"],"strategy":"one line"}\n' +
                      'Each point <28 Chinese chars. Strategy <35 chars. Technical points should mention RSI/ATR/POC where relevant.')
                  ds_data = json.dumps({'model': 'deepseek-chat',
                      'messages': [{'role': 'user', 'content': prompt}],
                      'max_tokens': 400}).encode()
                  ds_req = urllib.request.Request('https://api.deepseek.com/v1/chat/completions',
                      data=ds_data,
                      headers={'Authorization': 'Bearer ' + ds_key, 'Content-Type': 'application/json'})
                  with urllib.request.urlopen(ds_req, timeout=30) as r:
                      ds_res = json.loads(r.read())
                  raw = ds_res['choices'][0]['message']['content'].strip()
                  if raw.startswith('```'):
                      raw = raw.split('```')[1]
                      if raw.startswith('json'):
                          raw = raw[4:]
                  ana   = json.loads(raw)
                  fund  = ana.get('fundamental', [])
                  tech  = ana.get('technical',   [])
                  strat = ana.get('strategy',    '')
                  print('DeepSeek OK')
              except Exception as e:
                  print('DeepSeek failed:', e)

          if not fund:
              if dxy_dir == 'falling':
                  fund  = ['美元指数 DXY ' + str(dxy) + ' 下行，利好黄金',
                           '避险需求支撑黄金价格',
                           '地缘政治不确定性提升吸引力',
                           '实际利率低位对黄金构成支撑']
                  tech  = ['短线上升趋势，支撑 ' + str(s1) + ' 有效',
                           '关键阻力 ' + str(r1) + '，突破可看 ' + str(r2)]
                  strat = '多头思路，回调 ' + str(s1) + ' 附近关注买入'
              else:
                  fund  = ['美元指数 DXY ' + str(dxy) + ' 上行，利空黄金',
                           '实际利率上升压制黄金需求',
                           '市场风险偏好改善，避险吸引力减弱',
                           '技术面短线承压']
