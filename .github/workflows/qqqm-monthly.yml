name: QQQM Monthly Report

on:
  schedule:
    - cron: '0 20 1 * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate and send QQQM report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python3 <<'PYEOF'
          import urllib.request, json, os, subprocess
          from datetime import datetime, timezone, timedelta

          beijing_tz = timezone(timedelta(hours=8))
          now      = datetime.now(beijing_tz)
          date_str = str(now.day) + '-' + str(now.month) + '-' + str(now.year)
          date_cn  = now.strftime('%Y年%m月%d日')

          # 1. Fetch QQQM
          req = urllib.request.Request(
              'https://query1.finance.yahoo.com/v8/finance/chart/QQQM?interval=1d&range=30d',
              headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=15) as r:
              d = json.loads(r.read())
          closes = [c for c in d['chart']['result'][0]['indicators']['quote'][0]['close'] if c is not None]
          current        = round(closes[-1], 2)
          monthly_change = (current - closes[0])  / closes[0]  * 100
          weekly_change  = (current - closes[-5]) / closes[-5] * 100 if len(closes) >= 5 else 0
          ma20           = sum(closes[-20:]) / min(len(closes), 20)
          vs_ma20        = (current - ma20) / ma20 * 100
          print('QQQM:', current, 'date:', date_str)

          # 2. Signal
          if monthly_change < -5:
              signal = '分批投入'
              sig_color = '#ff6b6b'
          elif monthly_change < -2 and vs_ma20 < -3:
              signal = '少投观望'
              sig_color = '#ffa94d'
          elif monthly_change > 8:
              signal = '正常执行'
              sig_color = '#51cf66'
          else:
              signal = '直接投满'
              sig_color = '#00c853'

          # 3. DeepSeek commentary
          commentary = ''
          ds_key = os.environ.get('DEEPSEEK_API_KEY', '')
          if ds_key:
              try:
                  prompt = ('QQQM ETF: price=' + str(current) +
                      ', monthly=' + '{:+.1f}'.format(monthly_change) + '%' +
                      ', weekly='  + '{:+.1f}'.format(weekly_change)  + '%' +
                      ', vs_MA20=' + '{:+.1f}'.format(vs_ma20) + '%' +
                      ', signal='  + signal +
                      '\nWrite ONE sentence in Chinese (under 60 chars) explaining the market context for this signal.')
                  ds_data = json.dumps({'model': 'deepseek-chat',
                      'messages': [{'role': 'user', 'content': prompt}],
                      'max_tokens': 120}).encode()
                  ds_req = urllib.request.Request('https://api.deepseek.com/v1/chat/completions',
                      data=ds_data,
                      headers={'Authorization': 'Bearer ' + ds_key, 'Content-Type': 'application/json'})
                  with urllib.request.urlopen(ds_req, timeout=30) as r:
                      commentary = json.loads(r.read())['choices'][0]['message']['content'].strip()
                  print('DeepSeek OK')
              except Exception as e:
                  print('DeepSeek failed:', e)

          # 4. HTML report
          def pct_color(v):
              return '#51cf66' if v >= 0 else '#ff6b6b'
          def pct_str(v):
              return '{:+.2f}%'.format(v)

          style = (
              '*{box-sizing:border-box;margin:0;padding:0}'
              'body{background:#0f0f0f;color:#e0e0e0;font-family:-apple-system,sans-serif;display:flex;justify-content:center;padding:16px}'
              '.card{width:100%;max-width:460px}'
              '.header{background:#1a1a1a;border:1px solid #FFD700;border-radius:12px;padding:20px;text-align:center;margin-bottom:12px}'
              '.header h1{color:#FFD700;font-size:22px;font-weight:700}'
              '.dt{color:#888;font-size:13px;margin-top:4px}'
              '.pbox{background:#1a1a1a;border-radius:12px;padding:20px;text-align:center;margin-bottom:12px}'
              '.price{font-size:42px;font-weight:800;color:#FFD700}'
              '.bbox{background:#1a1a1a;border-radius:12px;padding:20px;text-align:center;margin-bottom:12px}'
              '.blbl{color:#888;font-size:13px;margin-bottom:8px}'
              '.conf{display:inline-block;margin-top:8px;padding:4px 14px;background:#2a2a2a;border-radius:20px;font-size:13px;color:#aaa}'
              '.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}'
              '.mv{background:#1a1a1a;border-radius:8px;padding:12px;text-align:center}'
              '.ml{font-size:11px;color:#888;margin-bottom:4px}'
              '.mr{font-size:16px;font-weight:700}'
              '.ai{background:#1a1a1a;border-radius:12px;padding:16px;margin-bottom:12px}'
              '.ai-lbl{color:#888;font-size:12px;margin-bottom:8px}'
              '.ai-txt{font-size:14px;color:#ccc;line-height:1.7}'
              '.footer{text-align:center;color:#444;font-size:12px;padding:8px}'
          )

          html = ('<!DOCTYPE html><html lang="zh"><head>'
              '<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">'
              '<title>QQQM</title><style>' + style + '</style></head><body><div class="card">'
              '<div class="header"><h1>QQQM 定投摘要</h1><div class="dt">' + date_cn + '</div></div>'
              '<div class="pbox"><div class="price">$' + '{:,.2f}'.format(current) + '</div></div>'
              '<div class="grid3">'
              '<div class="mv"><div class="ml">本月涨跌</div><div class="mr" style="color:' + pct_color(monthly_change) + '">' + pct_str(monthly_change) + '</div></div>'
              '<div class="mv"><div class="ml">本周涨跌</div><div class="mr" style="color:' + pct_color(weekly_change)  + '">' + pct_str(weekly_change)  + '</div></div>'
              '<div class="mv"><div class="ml">vs MA20</div><div class="mr" style="color:'  + pct_color(vs_ma20)        + '">' + pct_str(vs_ma20)        + '</div></div>'
              '</div>'
              '<div class="bbox"><div class="blbl">本月建议</div>'
              '<div style="font-size:38px;font-weight:800;color:' + sig_color + '">' + signal + '</div>'
              '<div class="conf">每月1号更新</div></div>')

          if commentary:
              html += ('<div class="ai"><div class="ai-lbl">&#129302; DeepSeek 分析</div>'
                       '<div class="ai-txt">' + commentary + '</div></div>')

          html += ('<div class="footer">数据来源：Yahoo Finance &bull; DeepSeek &bull; 仅供参考</div>'
              '</div></body></html>')

          # 5. Write & push
          os.makedirs('QQQM', exist_ok=True)
          fname = 'QQQM/' + date_str + '.html'
          with open(fname, 'w', encoding='utf-8') as f:
              f.write(html)
          with open('QQQM/latest.html', 'w', encoding='utf-8') as f:
              f.write(html)

          subprocess.run(['git', 'config', 'user.email', 'action@github.com'], check=True)
          subprocess.run(['git', 'config', 'user.name',  'GitHub Actions'],    check=True)
          subprocess.run(['git', 'pull',   '--rebase', 'origin', 'main'],       check=True)
          subprocess.run(['git', 'add', fname, 'QQQM/latest.html'],             check=True)
          diff = subprocess.run(['git', 'diff', '--cached', '--quiet'])
          if diff.returncode != 0:
              subprocess.run(['git', 'commit', '-m', 'QQQM ' + date_str], check=True)
              subprocess.run(['git', 'push'], check=True)

          # 6. Telegram
          tg = os.environ.get('TELEGRAM_TOKEN', '')
          if not tg:
              raise Exception('TELEGRAM_TOKEN not set')

          page_url = 'https://ctsy0225.github.io/qqqm-monitor/QQQM/latest.html'
          lines = [
              'QQQM ' + str(now.year) + '年' + str(now.month) + '月 定投摘要',
              '',
              '价格：$' + '{:.2f}'.format(current),
              '本月涨跌：' + '{:+.1f}'.format(monthly_change) + '%',
              '本周涨跌：' + '{:+.1f}'.format(weekly_change)  + '%',
              'vs MA20：'  + '{:+.1f}'.format(vs_ma20)        + '%',
              '',
              '本月建议：' + signal,
              '',
              page_url,
              date_cn,
          ]
          msg  = '\n'.join(lines)
          data = json.dumps({'chat_id': '6454973171', 'text': msg}).encode()
          tg_req = urllib.request.Request(
              'https://api.telegram.org/bot' + tg + '/sendMessage',
              data=data, headers={'Content-Type': 'application/json'})
          with urllib.request.urlopen(tg_req) as resp:
              print('Telegram:', json.loads(resp.read()).get('ok'))
          print('DONE.')
          PYEOF
